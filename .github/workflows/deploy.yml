name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to Backend Instances
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          # This tells GitHub to run the exact same deployment block across both hosts
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /coderepo/ServerDeckBackend
            git pull origin main
            source /coderepo/ServerDeckBackend/venvsd/bin/activate
            pip install -r Backend/requirements.txt --quiet
            sudo systemctl daemon-reload
            sudo systemctl restart serverdeckapi.service

      - name: Verify Health Check via Load Balancer
        run: |
          echo "Waiting 10 seconds for services to cycle behind the ALB..."
          sleep 10
          echo "Checking /api/health via domain gateway..."
          RESPONSE=$(curl -s -X 'GET' 'https://api.serverdeck.online/api/health' -H 'accept: application/json')
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"ok"' && echo "$RESPONSE" | grep -q '"serverdeck-api"'; then
            echo "Health check passed!"
          else
            echo "Health check failed! Expected status=ok and service=serverdeck-api"
            exit 1
          fi

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ashwinvk77@gmail.com
          from: "ServerDeck CI/CD <${{ secrets.MAIL_USERNAME }}>"
          subject: "✅ ServerDeck Deployed Successfully"
          html_body: |
            <div style="font-family:sans-serif;max-width:600px;margin:auto;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
              <div style="background:#16a34a;padding:24px;text-align:center">
                <h1 style="color:white;margin:0;font-size:22px">✅ Deployment Successful</h1>
              </div>
              <div style="padding:24px;background:#f9fafb">
                <table style="width:100%;border-collapse:collapse">
                  <tr><td style="padding:8px 0;color:#6b7280;width:140px">Repository</td><td style="padding:8px 0;font-weight:600">${{ github.repository }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Branch</td><td style="padding:8px 0;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Commit</td><td style="padding:8px 0;font-family:monospace;font-size:13px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Triggered by</td><td style="padding:8px 0;font-weight:600">${{ github.actor }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Time</td><td style="padding:8px 0">${{ github.event.head_commit.timestamp }}</td></tr>
                </table>
                <div style="margin-top:20px;padding:12px 16px;background:#dcfce7;border-left:4px solid #16a34a;border-radius:4px">
                  <p style="margin:0;color:#15803d;font-size:14px">🚀 Both ServerDeck backends are upgraded and live behind the ALB.</p>
                </div>
                <div style="margin-top:16px;text-align:center">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="display:inline-block;padding:10px 20px;background:#16a34a;color:white;border-radius:6px;text-decoration:none;font-size:14px">
                    View Run →
                  </a>
                </div>
              </div>
              <div style="padding:12px 24px;background:#f1f5f9;text-align:center">
                <p style="margin:0;color:#94a3b8;font-size:12px">ServerDeck CI/CD • ${{ github.repository }}</p>
              </div>
            </div>

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ashwinvk77@gmail.com
          from: "ServerDeck CI/CD <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ ServerDeck Deployment Failed"
          html_body: |
            <div style="font-family:sans-serif;max-width:600px;margin:auto;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
              <div style="background:#dc2626;padding:24px;text-align:center">
                <h1 style="color:white;margin:0;font-size:22px">❌ Deployment Failed</h1>
              </div>
              <div style="padding:24px;background:#f9fafb">
                <table style="width:100%;border-collapse:collapse">
                  <tr><td style="padding:8px 0;color:#6b7280;width:140px">Repository</td><td style="padding:8px 0;font-weight:600">${{ github.repository }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Branch</td><td style="padding:8px 0;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Commit</td><td style="padding:8px 0;font-family:monospace;font-size:13px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Triggered by</td><td style="padding:8px 0;font-weight:600">${{ github.actor }}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280">Time</td><td style="padding:8px 0">${{ github.event.head_commit.timestamp }}</td></tr>
                </table>
                <div style="margin-top:20px;padding:12px 16px;background:#fee2e2;border-left:4px solid #dc2626;border-radius:4px">
                  <p style="margin:0;color:#991b1b;font-size:14px">⚠️ Check the logs and fix the issue before the next push.</p>
                </div>
                <div style="margin-top:16px;text-align:center">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="display:inline-block;padding:10px 20px;background:#dc2626;color:white;border-radius:6px;text-decoration:none;font-size:14px">
                    View Logs →
                  </a>
                </div>
              </div>
              <div style="padding:12px 24px;background:#f1f5f9;text-align:center">
                <p style="margin:0;color:#94a3b8;font-size:12px">ServerDeck CI/CD • ${{ github.repository }}</p>
              </div>
            </div>